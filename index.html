<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter card</title>
    <link rel="stylesheet" href="./dist/output.css" />
  </head>
  <body class="bg-slate-300">
    <div
      class="mt-20 mx-auto max-w-4xl flex flex-wrap rounded-lg border-2 border-black bg-white pb-4"
    >
      <!-- Quote container -->
      <div
        class="bg-gradient-to-r from-sky-500 to-indigo-500 text-white h-24 flex justify-center items-center font-bold text-3xl w-full rounded-t"
      >
        News you can trust.
      </div>
      <!-- Content container -->
      <div class="text-center mt-6 w-full">
        <h3 class="text-lg font-semibold">Stay up to date with the latest!</h3>
        <p>
          Subscribe to our newsletter for the latest news straight into your
          inbox.
        </p>
        <form action="" class="flex flex-wrap">
          <input
            type="text"
            placeholder="Your email-id"
            class="w-full max-w-xl mx-auto bg-slate-300 text-center placeholder:text-sm my-4 p-2.5 rounded"
          />

          <button
            class="bg-blue-500 w-full max-w-xl mx-auto text-white py-1.5 rounded-full"
          >
            Subscribe now
          </button>
        </form>
        <p class="mx-6 mt-6 text-sm">We value your privacy</p>
      </div>
    </div>
  </body>
</html>
